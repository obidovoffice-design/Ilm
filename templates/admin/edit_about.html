{% extends "admin/base_admin.html" %}
{% block title %}Biz haqimizda tahrirlash{% endblock %}
{% block page_title %}Biz haqimizda matnini tahrirlash{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5>Asosiy kontentni tahrirlash</h5>
    <a href="{{ url_for('admin_about_features') }}" class="admin-btn admin-btn-secondary"><i class="fas fa-arrow-left"></i> Orqaga</a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Sarlavha *</label>
          <input type="text" name="title" class="admin-form-control" value="{{ about.title if about else '' }}" required placeholder="Ilm Plyus haqida"/>
        </div>
        <div class="admin-form-group">
          <label>Tajriba yillari</label>
          <input type="number" name="experience_years" class="admin-form-control" value="{{ about.experience_years if about else 14 }}" min="1"/>
        </div>
      </div>
      <div class="admin-form-group">
        <label>Rasm URL</label>
        <input type="text" name="image_url" class="admin-form-control" value="{{ about.image_url if about else '' }}" placeholder="https://..."/>
      </div>
      <div class="admin-form-group">
        <label>1-paragraf *</label>
        <textarea name="description_1" class="admin-form-control" rows="3" required>{{ about.description_1 if about else '' }}</textarea>
      </div>
      <div class="admin-form-group">
        <label>2-paragraf</label>
        <textarea name="description_2" class="admin-form-control" rows="3">{{ about.description_2 if about else '' }}</textarea>
      </div>
      <div class="admin-form-group">
        <label>3-paragraf</label>
        <textarea name="description_3" class="admin-form-control" rows="3">{{ about.description_3 if about else '' }}</textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_about_features') }}" class="admin-btn admin-btn-secondary">Bekor</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
