{% extends "admin/base_admin.html" %}
{% block title %}Kursni tahrirlash{% endblock %}
{% block page_title %}Kursni tahrirlash: {{ course.title }}{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5><i class="fas fa-edit" style="margin-right:8px"></i>Kurs ma'lumotlari</h5>
    <a href="{{ url_for('admin_courses') }}" class="admin-btn admin-btn-secondary">
      <i class="fas fa-arrow-left"></i> Orqaga
    </a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-group">
        <label>Kurs nomi *</label>
        <input type="text" name="title" class="admin-form-control" value="{{ course.title }}" required/>
      </div>
      <div class="admin-form-group">
        <label>Tavsif *</label>
        <textarea name="description" class="admin-form-control" rows="4" required>{{ course.description }}</textarea>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Davomiyligi *</label>
          <input type="text" name="duration" class="admin-form-control" value="{{ course.duration }}" required/>
        </div>
        <div class="admin-form-group">
          <label>Narxi *</label>
          <input type="text" name="price" class="admin-form-control" value="{{ course.price }}" required/>
        </div>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Belgisi (emoji)</label>
          <input type="text" name="icon" class="admin-form-control" value="{{ course.icon }}"/>
        </div>
        <div class="admin-form-group">
          <label>Kategoriya *</label>
          <select name="category" class="admin-form-control" required>
            <option value="til" {% if course.category=='til' %}selected{% endif %}>Til kurslari</option>
            <option value="fan" {% if course.category=='fan' %}selected{% endif %}>Aniq fanlar</option>
            <option value="it" {% if course.category=='it' %}selected{% endif %}>IT / Dasturlash</option>
            <option value="boshqa" {% if course.category=='boshqa' %}selected{% endif %}>Boshqa</option>
          </select>
        </div>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Daraja</label>
          <select name="level" class="admin-form-control">
            <option value="Boshlang'ich" {% if course.level=="Boshlang'ich" %}selected{% endif %}>Boshlang'ich</option>
            <option value="O'rta" {% if course.level=="O'rta" %}selected{% endif %}>O'rta</option>
            <option value="Ilg'or" {% if course.level=="Ilg'or" %}selected{% endif %}>Ilg'or</option>
            <option value="Barcha darajalar" {% if course.level=="Barcha darajalar" %}selected{% endif %}>Barcha darajalar</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>O'quvchilar soni</label>
          <input type="number" name="students_count" class="admin-form-control" value="{{ course.students_count }}" min="0"/>
        </div>
      </div>
      <div class="admin-form-group">
        <label class="admin-checkbox-label">
          <input type="checkbox" name="is_active" {% if course.is_active %}checked{% endif %}/> Faol kurs
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_courses') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
