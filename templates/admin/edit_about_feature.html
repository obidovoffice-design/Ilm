{% extends "admin/base_admin.html" %}
{% block title %}Xususiyatni tahrirlash{% endblock %}
{% block page_title %}Xususiyatni tahrirlash{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5>Xususiyat ma'lumotlari</h5>
    <a href="{{ url_for('admin_about_features') }}" class="admin-btn admin-btn-secondary"><i class="fas fa-arrow-left"></i> Orqaga</a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Sarlavha *</label>
          <input type="text" name="title" class="admin-form-control" value="{{ feature.title }}" required/>
        </div>
        <div class="admin-form-group">
          <label>Font Awesome icon</label>
          <input type="text" name="icon" class="admin-form-control" value="{{ feature.icon or 'fas fa-check-circle' }}"/>
        </div>
      </div>
      <div class="admin-form-group">
        <label>Tavsif *</label>
        <textarea name="description" class="admin-form-control" rows="3" required>{{ feature.description }}</textarea>
      </div>
      <div class="admin-form-group">
        <label>Tartib raqami</label>
        <input type="number" name="order" class="admin-form-control" value="{{ feature.order }}" min="0"/>
      </div>
      <div class="admin-form-group"><label class="admin-checkbox-label"><input type="checkbox" name="is_active" {% if feature.is_active %}checked{% endif %}/> Faol</label></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_about_features') }}" class="admin-btn admin-btn-secondary">Bekor</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
