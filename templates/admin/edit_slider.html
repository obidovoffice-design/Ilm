{% extends "admin/base_admin.html" %}
{% block title %}Slayderni tahrirlash{% endblock %}
{% block page_title %}Slayderni tahrirlash{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5>Slayder ma'lumotlari</h5>
    <a href="{{ url_for('admin_sliders') }}" class="admin-btn admin-btn-secondary"><i class="fas fa-arrow-left"></i> Orqaga</a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-group">
        <label>Sarlavha *</label>
        <input type="text" name="title" class="admin-form-control" value="{{ slider.title }}" required/>
      </div>
      <div class="admin-form-group">
        <label>Tavsif</label>
        <textarea name="description" class="admin-form-control" rows="3">{{ slider.description or '' }}</textarea>
      </div>
      <div class="admin-form-group">
        <label>Rasm URL</label>
        <input type="text" name="image_url" class="admin-form-control" value="{{ slider.image_url }}"/>
      </div>
      <div class="admin-form-group">
        <label>Tartib raqami</label>
        <input type="number" name="order" class="admin-form-control" value="{{ slider.order }}" min="0"/>
      </div>
      <div class="admin-form-group"><label class="admin-checkbox-label"><input type="checkbox" name="is_active" {% if slider.is_active %}checked{% endif %}/> Faol</label></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_sliders') }}" class="admin-btn admin-btn-secondary">Bekor</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
