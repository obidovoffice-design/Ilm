<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi blok qo'shish - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="Ilm Plyus Logo">
                <p>Admin Panel</p>
            </div>
            <div class="admin-sidebar-menu">
                <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
                    <i class="fas fa-dashboard"></i> Dashboard
                </a>
                <a href="{{ url_for('admin_sliders') }}" class="admin-menu-item">
                    <i class="fas fa-images"></i> Slayderlar
                </a>
                <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
                    <i class="fas fa-book"></i> Kurslar
                </a>
                <a href="{{ url_for('admin_branches') }}" class="admin-menu-item">
                    <i class="fas fa-map-marker-alt"></i> Filiallar
                </a>
                <a href="{{ url_for('admin_about') }}" class="admin-menu-item active">
                    <i class="fas fa-info-circle"></i> Biz haqimizda
                </a>
                <a href="{{ url_for('admin_testimonials') }}" class="admin-menu-item">
                    <i class="fas fa-star"></i> O'quvchilar fikrlar
                </a>
                <a href="{{ url_for('admin_news') }}" class="admin-menu-item">
                    <i class="fas fa-newspaper"></i> Yangiliklar
                </a>
                <a href="{{ url_for('admin_applications') }}" class="admin-menu-item">
                    <i class="fas fa-envelope"></i> Arizalar
                </a>
                <a href="{{ url_for('admin_profile') }}" class="admin-menu-item">
                    <i class="fas fa-user-circle"></i> Profil
                </a>
                <a href="{{ url_for('admin_logout') }}" class="admin-menu-item">
                    <i class="fas fa-sign-out-alt"></i> Chiqish
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-navbar">
                <div class="admin-navbar-title">
                    <h4>Yangi "Nima uchun biz?" bloki qo'shish</h4>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-header">
                    <h5>Blok ma'lumotlari</h5>
                </div>
                <div class="admin-card-body">
                    <form method="POST">
                        <div class="admin-form-group">
                            <label>Sarlavha</label>
                            <input type="text" name="title" class="admin-form-control" placeholder="Masalan: Tajribali o'qituvchilar" required>
                        </div>
                        <div class="admin-form-group">
                            <label>Tavsif</label>
                            <textarea name="description" class="admin-form-control" rows="3" placeholder="Blok haqida qisqacha ma'lumot"></textarea>
                        </div>
                        <div class="admin-form-group">
                            <label>Icon (Font Awesome class)</label>
                            <input type="text" name="icon" class="admin-form-control" value="fas fa-check-circle" required>
                            <small style="color: #666;">Masalan: fas fa-check-circle, fas fa-star, fas fa-users</small>
                        </div>
                        <div class="admin-form-group">
                            <label>Tartib raqami</label>
                            <input type="number" name="order" class="admin-form-control" value="0">
                        </div>
                        <div class="admin-form-group">
                            <label>
                                <input type="checkbox" name="is_active" checked> Faol
                            </label>
                        </div>
                        <div style="margin-top: 20px; display: flex; gap: 10px;">
                            <button type="submit" class="admin-btn admin-btn-primary">
                                <i class="fas fa-save"></i> Qo'shish
                            </button>
                            <a href="{{ url_for('admin_about_features') }}" class="admin-btn admin-btn-secondary">
                                Bekor qilish
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
