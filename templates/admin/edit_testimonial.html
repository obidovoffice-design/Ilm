<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fikrni tahrirlash - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Ilm Plyus Logo">
          <p>Admin Panel</p>
        </div>
        <div class="admin-sidebar-menu">
          <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
            <i class="fas fa-dashboard"></i> Dashboard
          </a>
          <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
            <i class="fas fa-book"></i> Kurslar
          </a>
          <a href="{{ url_for('admin_branches') }}" class="admin-menu-item">
            <i class="fas fa-map-marker-alt"></i> Filiallar
          </a>
          <a href="{{ url_for('admin_testimonials') }}" class="admin-menu-item">
            <i class="fas fa-star"></i> O'quvchilar fikriyati
          </a>
          <a href="{{ url_for('admin_news') }}" class="admin-menu-item">
            <i class="fas fa-newspaper"></i> Yangiliklar
          </a>
          <a href="{{ url_for('admin_applications') }}" class="admin-menu-item">
            <i class="fas fa-envelope"></i> Arizalar
          </a>
          <a href="{{ url_for('admin_profile') }}" class="admin-menu-item">
            <i class="fas fa-user-circle"></i> Profil
          </a>
          <a href="{{ url_for('admin_logout') }}" class="admin-menu-item">
            <i class="fas fa-sign-out-alt"></i> Chiqish
          </a>
        </div>
      </div>
      <div class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <h5>Fikrni tahrirlash</h5>
          </div>
          <div class="admin-card-body">
            <form method="post">
              <div class="admin-form-group">
                <label>O'quvchi nomi *</label>
                <input type="text" name="name" class="admin-form-control" value="{{ testimonial.name }}" required placeholder="Ismingiz" />
              </div>
              <div class="admin-form-group">
                <label>Lavozimi *</label>
                <input type="text" name="position" class="admin-form-control" value="{{ testimonial.position }}" required placeholder="Buxgalter, Muhandis, etc." />
              </div>
              <div class="admin-form-group">
                <label>O'quvchi fikriyati/Fikri *</label>
                <textarea name="text" class="admin-form-control" rows="6" required placeholder="O'quvchi fikrini yozing...">{{ testimonial.text }}</textarea>
              </div>
              <div class="admin-form-group">
                <label>Reyting (1-5 yulduz)</label>
                <select name="rating" class="admin-form-control">
                  <option value="5" {% if testimonial.rating == 5 %}selected{% endif %}>5 yulduz - Juda yaxshi</option>
                  <option value="4" {% if testimonial.rating == 4 %}selected{% endif %}>4 yulduz - Yaxshi</option>
                  <option value="3" {% if testimonial.rating == 3 %}selected{% endif %}>3 yulduz - Qanoat qiluvchi</option>
                  <option value="2" {% if testimonial.rating == 2 %}selected{% endif %}>2 yulduz - Yomon</option>
                  <option value="1" {% if testimonial.rating == 1 %}selected{% endif %}>1 yulduz - Juda yomon</option>
                </select>
              </div>
              <div class="admin-form-group">
                <label>Kurs (Ixtiyoriy)</label>
                <select name="course_id" class="admin-form-control">
                  <option value="">Kursni tanlang</option>
                  {% for course in courses %}
                  <option value="{{ course.id }}" {% if testimonial.course_id == course.id %}selected{% endif %}>{{ course.title }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="admin-form-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="is_active" name="is_active" {% if testimonial.is_active %}checked{% endif %} />
                <label for="is_active" style="margin: 0;">Veb-saytda ko'rinsin</label>
              </div>
              <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="admin-btn admin-btn-primary">
                  <i class="fas fa-save"></i> Yangilash
                </button>
                <a href="{{ url_for('admin_testimonials') }}" class="admin-btn admin-btn-outline">
                  <i class="fas fa-times"></i> Bekor qilish
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
