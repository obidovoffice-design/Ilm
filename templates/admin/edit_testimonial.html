{% extends "admin/base_admin.html" %}
{% block title %}Fikrni tahrirlash{% endblock %}
{% block page_title %}Fikrni tahrirlash{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5><i class="fas fa-edit" style="margin-right:8px"></i>Fikr ma'lumotlari</h5>
    <a href="{{ url_for('admin_testimonials') }}" class="admin-btn admin-btn-secondary">
      <i class="fas fa-arrow-left"></i> Orqaga
    </a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>O'quvchi ismi *</label>
          <input type="text" name="name" class="admin-form-control" value="{{ testimonial.name }}" required/>
        </div>
        <div class="admin-form-group">
          <label>Lavozimi *</label>
          <input type="text" name="position" class="admin-form-control" value="{{ testimonial.position }}" required/>
        </div>
      </div>
      <div class="admin-form-group">
        <label>Fikr matni *</label>
        <textarea name="text" class="admin-form-control" rows="4" required>{{ testimonial.text }}</textarea>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Reyting</label>
          <select name="rating" class="admin-form-control">
            {% for r in [5,4,3,2,1] %}
            <option value="{{ r }}" {% if testimonial.rating == r %}selected{% endif %}>
              {{ '⭐' * r }} ({{ r }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="admin-form-group">
          <label>Kurs (ixtiyoriy)</label>
          <select name="course_id" class="admin-form-control">
            <option value="">Kurs tanlang</option>
            {% for course in courses %}
            <option value="{{ course.id }}" {% if testimonial.course_id == course.id %}selected{% endif %}>
              {{ course.title }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="admin-form-group">
        <label class="admin-checkbox-label">
          <input type="checkbox" name="is_active" {% if testimonial.is_active %}checked{% endif %}/> Veb-saytda ko'rinsin
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_testimonials') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
