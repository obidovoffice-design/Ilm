<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filialni tahrirlash - Admin Panel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='admin.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Ilm Plyus Logo">
          <p>Admin Panel</p>
        </div>
        <div class="admin-sidebar-menu">
          <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
            <i class="fas fa-dashboard"></i> Dashboard
          </a>
          <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
            <i class="fas fa-book"></i> Kurslar
          </a>
          <a
            href="{{ url_for('admin_branches') }}"
            class="admin-menu-item active"
          >
            <i class="fas fa-map-marker-alt"></i> Filiallar
          </a>
          <a href="{{ url_for('admin_testimonials') }}" class="admin-menu-item">
            <i class="fas fa-star"></i> O'quvchilar fikriyati
          </a>
          <a href="{{ url_for('admin_news') }}" class="admin-menu-item">
            <i class="fas fa-newspaper"></i> Yangiliklar
          </a>
          <a href="{{ url_for('admin_applications') }}" class="admin-menu-item">
            <i class="fas fa-envelope"></i> Arizalar
          </a>
          <a href="{{ url_for('admin_profile') }}" class="admin-menu-item">
            <i class="fas fa-user-circle"></i> Profil
          </a>
          <a href="{{ url_for('admin_logout') }}" class="admin-menu-item">
            <i class="fas fa-sign-out-alt"></i> Chiqish
          </a>
        </div>
      </div>
      <div class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <h5>Filialni tahrirlash</h5>
          </div>
          <div class="admin-card-body">
            <form method="post">
              <div class="admin-form-group">
                <label>Filial nomi *</label>
                <input
                  type="text"
                  name="name"
                  class="admin-form-control"
                  value="{{ branch.name }}"
                  required
                />
              </div>
              <div class="admin-form-group">
                <label>Manzil *</label>
                <input
                  type="text"
                  name="address"
                  class="admin-form-control"
                  value="{{ branch.address }}"
                  required
                />
              </div>
              <div class="admin-form-row">
                <div class="admin-form-group">
                  <label>Telefon 1 *</label>
                  <input
                    type="text"
                    name="phone"
                    class="admin-form-control"
                    value="{{ branch.phone }}"
                    required
                  />
                </div>
                <div class="admin-form-group">
                  <label>Telefon 2</label>
                  <input
                    type="text"
                    name="phone2"
                    class="admin-form-control"
                    value="{{ branch.phone2 }}"
                  />
                </div>
              </div>
              <div class="admin-form-group">
                <label>Email</label>
                <input
                  type="email"
                  name="email"
                  class="admin-form-control"
                  value="{{ branch.email }}"
                />
              </div>
              <div class="admin-form-row">
                <div class="admin-form-group">
                  <label>Ish vaqti *</label>
                  <input
                    type="text"
                    name="work_time"
                    class="admin-form-control"
                    value="{{ branch.work_time }}"
                    required
                  />
                </div>
                <div class="admin-form-group">
                  <label>Shanba ish vaqti</label>
                  <input
                    type="text"
                    name="work_time_saturday"
                    class="admin-form-control"
                    value="{{ branch.work_time_saturday }}"
                  />
                </div>
              </div>
              <div class="admin-form-row">
                <div class="admin-form-group">
                  <label>Latitude *</label>
                  <input
                    type="text"
                    name="latitude"
                    class="admin-form-control"
                    value="{{ branch.latitude }}"
                    required
                  />
                </div>
                <div class="admin-form-group">
                  <label>Longitude *</label>
                  <input
                    type="text"
                    name="longitude"
                    class="admin-form-control"
                    value="{{ branch.longitude }}"
                    required
                  />
                </div>
              </div>
              <div class="admin-form-group">
                <label>Tuman *</label>
                <input
                  type="text"
                  name="district"
                  class="admin-form-control"
                  value="{{ branch.district }}"
                  required
                />
              </div>
              <div class="admin-form-group">
                <label>Imkoniyatlar</label>
                <input
                  type="text"
                  name="features"
                  class="admin-form-control"
                  value="{{ branch.features }}"
                  placeholder="Wi-Fi, Konditsioner, Kutubxona..."
                />
              </div>
              <div class="admin-form-group">
                <label>Rasm URL</label>
                <input
                  type="text"
                  name="image_url"
                  class="admin-form-control"
                  value="{{ branch.image_url }}"
                />
              </div>
              <div class="admin-form-group">
                <label>Faollik</label>
                <input
                  type="checkbox"
                  name="is_active"
                  {%
                  if
                  branch.is_active
                  %}checked{%
                  endif
                  %}
                />
                Faol
              </div>
              <div class="admin-form-group">
                <label>Filial tartib raqami</label>
                <input
                  type="number"
                  name="order"
                  class="admin-form-control"
                  value="{{ branch.order }}"
                />
              </div>
              <button type="submit" class="admin-btn admin-btn-primary">
                <i class="fas fa-save"></i> Saqlash
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
