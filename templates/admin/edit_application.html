<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arizani tahrirlash - Admin Panel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='admin.css') }}"
    />
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <h3>Ilm<span>Plyus</span></h3>
          <p>Admin Panel</p>
        </div>
        <div class="admin-sidebar-menu">
          <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
            <i class="fas fa-dashboard"></i> Dashboard
          </a>
          <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
            <i class="fas fa-book"></i> Kurslar
          </a>
          <a href="{{ url_for('admin_branches') }}" class="admin-menu-item">
            <i class="fas fa-map-marker-alt"></i> Filiallar
          </a>
          <a href="{{ url_for('admin_news') }}" class="admin-menu-item">
            <i class="fas fa-newspaper"></i> Yangiliklar
          </a>
          <a
            href="{{ url_for('admin_applications') }}"
            class="admin-menu-item active"
          >
            <i class="fas fa-envelope"></i> Arizalar
          </a>
        </div>
      </div>
      <div class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <h5>Arizani tahrirlash</h5>
          </div>
          <div class="admin-card-body">
            <form method="post">
              <div class="admin-form-group">
                <label>F.I.Sh.</label>
                <input
                  type="text"
                  name="name"
                  class="admin-form-control"
                  value="{{ application.name }}"
                  required
                />
              </div>
              <div class="admin-form-group">
                <label>Telefon</label>
                <input
                  type="text"
                  name="phone"
                  class="admin-form-control"
                  value="{{ application.phone }}"
                  required
                />
              </div>
              <div class="admin-form-group">
                <label>Email</label>
                <input
                  type="email"
                  name="email"
                  class="admin-form-control"
                  value="{{ application.email }}"
                />
              </div>
              <div class="admin-form-group">
                <label>Status</label>
                <select name="status" class="admin-form-control">
                  <option
                    value="new"
                    {%
                    if
                    application.status=""
                    ="new"
                    %}selected{%
                    endif
                    %}
                  >
                    Yangi
                  </option>
                  <option
                    value="completed"
                    {%
                    if
                    application.status=""
                    ="completed"
                    %}selected{%
                    endif
                    %}
                  >
                    Yakunlangan
                  </option>
                  <option
                    value="cancelled"
                    {%
                    if
                    application.status=""
                    ="cancelled"
                    %}selected{%
                    endif
                    %}
                  >
                    Bekor qilingan
                  </option>
                </select>
              </div>
              <div class="admin-form-group">
                <label>Xabar</label>
                <textarea name="message" class="admin-form-control">
{{ application.message }}</textarea
                >
              </div>
              <button type="submit" class="admin-btn admin-btn-primary">
                <i class="fas fa-save"></i> Saqlash
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
