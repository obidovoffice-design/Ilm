<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yangilikni tahrirlash - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Ilm Plyus Logo">
          <p>Admin Panel</p>
        </div>
        <div class="admin-sidebar-menu">
          <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
            <i class="fas fa-dashboard"></i> Dashboard
          </a>
          <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
            <i class="fas fa-book"></i> Kurslar
          </a>
          <a href="{{ url_for('admin_branches') }}" class="admin-menu-item">
            <i class="fas fa-map-marker-alt"></i> Filiallar
          </a>
          <a href="{{ url_for('admin_testimonials') }}" class="admin-menu-item">
            <i class="fas fa-star"></i> O'quvchilar fikriyati
          </a>
          <a href="{{ url_for('admin_news') }}" class="admin-menu-item active">
            <i class="fas fa-newspaper"></i> Yangiliklar
          </a>
          <a href="{{ url_for('admin_applications') }}" class="admin-menu-item">
            <i class="fas fa-envelope"></i> Arizalar
          </a>
          <a href="{{ url_for('admin_profile') }}" class="admin-menu-item">
            <i class="fas fa-user-circle"></i> Profil
          </a>
          <a href="{{ url_for('admin_logout') }}" class="admin-menu-item">
            <i class="fas fa-sign-out-alt"></i> Chiqish
          </a>
        </div>
      </div>
      <div class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <h5>Yangilikni tahrirlash</h5>
          </div>
          <div class="admin-card-body">
            <form action="{{ url_for('admin_edit_news', news_id=news.id) }}" method="POST">
              <div class="form-group">
                <label>Sarlavha *</label>
                <input type="text" name="title" value="{{ news.title }}" required placeholder="Yangilik sarlavhasini kiriting">
              </div>
              <div class="form-group">
                <label>Rasm URL</label>
                <input type="text" name="image_url" value="{{ news.image_url }}" placeholder="Rasm URL manzilini kiriting">
              </div>
              <div class="form-group">
                <label>Matn *</label>
                <textarea name="content" rows="10" required placeholder="Yangilik matnini yozing...">{{ news.content }}</textarea>
              </div>
              <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" name="is_active" id="is_active" {% if news.is_active %}checked{% endif %}>
                <label for="is_active" style="margin-bottom: 0;">Faol</label>
              </div>
              <div style="margin-top: 20px;">
                <button type="submit" class="admin-btn admin-btn-primary">Saqlash</button>
                <a href="{{ url_for('admin_news') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
