{% extends "admin/base_admin.html" %}
{% block title %}Yangilik qo'shish{% endblock %}
{% block page_title %}Yangilik qo'shish{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5>Yangilik ma'lumotlari</h5>
    <a href="{{ url_for('admin_news') }}" class="admin-btn admin-btn-secondary"><i class="fas fa-arrow-left"></i> Orqaga</a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-group">
        <label>Sarlavha *</label>
        <input type="text" name="title" class="admin-form-control" required placeholder="Yangilik sarlavhasi"/>
      </div>
      <div class="admin-form-group">
        <label>Kontent *</label>
        <textarea name="content" class="admin-form-control" rows="8" required placeholder="To'liq matn..."></textarea>
      </div>
      <div class="admin-form-group">
        <label>Rasm URL</label>
        <input type="text" name="image_url" class="admin-form-control" placeholder="https://... yoki img/news.jpg"/>
      </div>
      <div class="admin-form-group"><label class="admin-checkbox-label"><input type="checkbox" name="is_active" checked/> Faol</label></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_news') }}" class="admin-btn admin-btn-secondary">Bekor</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
