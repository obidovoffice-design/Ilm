{% extends "admin/base_admin.html" %}
{% block title %}Yangi fikr{% endblock %}
{% block page_title %}Yangi fikr qo'shish{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5><i class="fas fa-quote-left" style="margin-right:8px"></i>Fikr ma'lumotlari</h5>
    <a href="{{ url_for('admin_testimonials') }}" class="admin-btn admin-btn-secondary">
      <i class="fas fa-arrow-left"></i> Orqaga
    </a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>O'quvchi ismi *</label>
          <input type="text" name="name" class="admin-form-control" required placeholder="To'liq ismi"/>
        </div>
        <div class="admin-form-group">
          <label>Lavozimi *</label>
          <input type="text" name="position" class="admin-form-control" required placeholder="Ingliz tili kursi"/>
        </div>
      </div>
      <div class="admin-form-group">
        <label>Fikr matni *</label>
        <textarea name="text" class="admin-form-control" rows="4" required
                  placeholder="O'quvchining fikrini yozing..."></textarea>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Reyting (1-5)</label>
          <select name="rating" class="admin-form-control">
            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
            <option value="4">⭐⭐⭐⭐ (4)</option>
            <option value="3">⭐⭐⭐ (3)</option>
            <option value="2">⭐⭐ (2)</option>
            <option value="1">⭐ (1)</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>Kursi</label>
          <select name="course_id" class="admin-form-control">
            <option value="">Kursni tanlang</option>
            {% for course in courses %}
            <option value="{{ course.id }}">{{ course.title }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="admin-form-group">
        <label class="admin-checkbox-label">
          <input type="checkbox" name="is_active" checked/> Faol
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_testimonials') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
