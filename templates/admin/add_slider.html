{% extends "admin/base_admin.html" %}
{% block title %}Yangi slayder{% endblock %}
{% block page_title %}Yangi slayder qo'shish{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5>Slayder ma'lumotlari</h5>
    <a href="{{ url_for('admin_sliders') }}" class="admin-btn admin-btn-secondary"><i class="fas fa-arrow-left"></i> Orqaga</a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-group">
        <label>Sarlavha *</label>
        <input type="text" name="title" class="admin-form-control" required placeholder="Slayder sarlavhasi"/>
      </div>
      <div class="admin-form-group">
        <label>Tavsif</label>
        <textarea name="description" class="admin-form-control" rows="3" placeholder="Qisqacha tavsif..."></textarea>
      </div>
      <div class="admin-form-group">
        <label>Rasm URL *</label>
        <input type="text" name="image_url" class="admin-form-control" required placeholder="img/slider1.png"/>
        <small class="admin-form-hint">Static faylli yoki to'liq URL</small>
      </div>
      <div class="admin-form-group">
        <label>Tartib raqami</label>
        <input type="number" name="order" class="admin-form-control" value="0" min="0"/>
      </div>
      <div class="admin-form-group"><label class="admin-checkbox-label"><input type="checkbox" name="is_active" checked/> Faol</label></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        <a href="{{ url_for('admin_sliders') }}" class="admin-btn admin-btn-secondary">Bekor</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
