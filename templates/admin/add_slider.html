<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi slayd qo'shish - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="Ilm Plyus Logo">
                <p>Admin Panel</p>
            </div>
            <div class="admin-sidebar-menu">
                <a href="{{ url_for('admin_dashboard') }}" class="admin-menu-item">
                    <i class="fas fa-dashboard"></i> Dashboard
                </a>
                <a href="{{ url_for('admin_sliders') }}" class="admin-menu-item active">
                    <i class="fas fa-images"></i> Slayderlar
                </a>
                <a href="{{ url_for('admin_courses') }}" class="admin-menu-item">
                    <i class="fas fa-book"></i> Kurslar
                </a>
                <a href="{{ url_for('admin_branches') }}" class="admin-menu-item">
                    <i class="fas fa-map-marker-alt"></i> Filiallar
                </a>
                <a href="{{ url_for('admin_testimonials') }}" class="admin-menu-item">
                    <i class="fas fa-star"></i> O'quvchilar fikriyati
                </a>
                <a href="{{ url_for('admin_news') }}" class="admin-menu-item">
                    <i class="fas fa-newspaper"></i> Yangiliklar
                </a>
                <a href="{{ url_for('admin_applications') }}" class="admin-menu-item">
                    <i class="fas fa-envelope"></i> Arizalar
                </a>
                <a href="{{ url_for('admin_profile') }}" class="admin-menu-item">
                    <i class="fas fa-user-circle"></i> Profil
                </a>
                <a href="{{ url_for('admin_logout') }}" class="admin-menu-item">
                    <i class="fas fa-sign-out-alt"></i> Chiqish
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h5>Yangi slayd qo'shish</h5>
                </div>
                <div class="admin-card-body">
                    <form action="{{ url_for('admin_add_slider') }}" method="POST" enctype="multipart/form-data">
                        <div class="admin-form-group">
                            <label class="admin-form-label">Sarlavha (H1)</label>
                            <input type="text" name="title" class="admin-form-control" placeholder="Masalan: Bilim sari zamonaviy yo'l" required>
                        </div>
                        <div class="admin-form-group">
                            <label class="admin-form-label">Tavsif (P)</label>
                            <textarea name="description" class="admin-form-control" rows="3" placeholder="Slayd ostidagi qisqa matn"></textarea>
                        </div>
                        <div class="admin-form-group">
                            <label class="admin-form-label">Slayd rasmi</label>
                            <input type="file" name="image" class="admin-form-control" accept="image/*" required>
                            <small style="color: #666;">Tavsiya etiladigan o'lcham: 1920x1080 yoki 16:9 nisbatda</small>
                        </div>
                        <div class="admin-form-group">
                            <label class="admin-form-label">Tartib raqami</label>
                            <input type="number" name="order" class="admin-form-control" value="0">
                        </div>
                        <div class="admin-form-group">
                            <label class="admin-checkbox-label">
                                <input type="checkbox" name="is_active" checked> Faol
                            </label>
                        </div>
                        <div style="margin-top: 20px;">
                            <button type="submit" class="admin-btn admin-btn-primary">Saqlash</button>
                            <a href="{{ url_for('admin_sliders') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
