{% extends "admin/base_admin.html" %}
{% block title %}Yangi kurs{% endblock %}
{% block page_title %}Yangi kurs qo'shish{% endblock %}

{% block content %}
<div class="admin-card">
  <div class="admin-card-header">
    <h5><i class="fas fa-plus-circle" style="margin-right:8px"></i>Kurs ma'lumotlari</h5>
    <a href="{{ url_for('admin_courses') }}" class="admin-btn admin-btn-secondary">
      <i class="fas fa-arrow-left"></i> Orqaga
    </a>
  </div>
  <div class="admin-card-body">
    <form method="POST">
      <div class="admin-form-group">
        <label>Kurs nomi *</label>
        <input type="text" name="title" class="admin-form-control" required placeholder="Masalan: Ingliz tili"/>
      </div>
      <div class="admin-form-group">
        <label>Kurs tavsifi *</label>
        <textarea name="description" class="admin-form-control" rows="4" required
                  placeholder="Kurs haqida batafsil ma'lumot..."></textarea>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Davomiyligi *</label>
          <input type="text" name="duration" class="admin-form-control" required placeholder="3 oy"/>
        </div>
        <div class="admin-form-group">
          <label>Narxi *</label>
          <input type="text" name="price" class="admin-form-control" required placeholder="450 000 so'm/oy"/>
        </div>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Belgisi (emoji) *</label>
          <input type="text" name="icon" class="admin-form-control" required placeholder="🇬🇧"/>
          <small class="admin-form-hint">Masalan: 🇬🇧 🇸🇦 🧮 💻</small>
        </div>
        <div class="admin-form-group">
          <label>Kategoriya *</label>
          <select name="category" class="admin-form-control" required>
            <option value="til">Til kurslari</option>
            <option value="fan">Aniq fanlar</option>
            <option value="it">IT / Dasturlash</option>
            <option value="boshqa">Boshqa</option>
          </select>
        </div>
      </div>
      <div class="admin-form-row">
        <div class="admin-form-group">
          <label>Daraja *</label>
          <select name="level" class="admin-form-control" required>
            <option value="Boshlang'ich">Boshlang'ich</option>
            <option value="O'rta">O'rta</option>
            <option value="Ilg'or">Ilg'or</option>
            <option value="Barcha darajalar">Barcha darajalar</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>O'quvchilar soni</label>
          <input type="number" name="students_count" class="admin-form-control" value="0" min="0"/>
        </div>
      </div>
      <div class="admin-form-group">
        <label class="admin-checkbox-label">
          <input type="checkbox" name="is_active" checked/> Faol kurs
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="admin-btn admin-btn-primary">
          <i class="fas fa-save"></i> Saqlash
        </button>
        <a href="{{ url_for('admin_courses') }}" class="admin-btn admin-btn-secondary">Bekor qilish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
