<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Ilm Plyus</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
      }

      .login-box {
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .login-header h2 {
        color: #1a237e;
        font-size: 28px;
        margin-bottom: 5px;
      }

      .login-header h2 span {
        color: #4fc3f7;
      }

      .login-header p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #1a237e;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: #1a237e;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }

      .btn-login:hover {
        background: #0d47a1;
      }

      .alert {
        background: #ffebee;
        color: #c62828;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 14px;
        text-align: center;
      }

      .login-footer {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <h2>Ilm<span>Plyus</span></h2>
          <p>Admin panelga kirish</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %} {% endif %} {% endwith %}

        <form method="POST">
          <div class="form-group">
            <label>Foydalanuvchi nomi</label>
            <input type="text" name="username" required placeholder="admin" />
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input
              type="password"
              name="password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt" style="margin-right: 8px"></i> Kirish
          </button>
        </form>

        <div class="login-footer">
          <p>Demo: admin / admin123</p>
        </div>
      </div>
    </div>
  </body>
</html>
